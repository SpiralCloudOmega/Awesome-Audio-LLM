name: stale issues and PRs

on:
  schedule:
    - cron: '17 3 * * *'   # daily at 03:17 UTC
  workflow_dispatch: {}

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 90
          days-before-issue-close: 30
          days-before-pr-stale: 60
          days-before-pr-close: 30
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,help-wanted,planned
          exempt-pr-labels: pinned,blocked,planned
          stale-issue-message: >
            This issue has been inactive for 90 days. If it's still relevant,
            please leave a comment or update it within 30 days, otherwise it
            will be automatically closed. Add the `pinned` label to opt out.
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen with new information.
          stale-pr-message: >
            This PR has been inactive for 60 days. Please rebase / update or
            comment within 30 days, otherwise it will be automatically closed.
          close-pr-message: >
            Closing this PR due to inactivity. Feel free to reopen when ready.
          operations-per-run: 100
