name: check README sync

on:
  pull_request:
    paths:
      - 'items/**'
      - 'format_input.py'
      - 'README.md'
      - '.github/workflows/check-readme-sync.yml'

jobs:
  check-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install matplotlib==3.10.0 numpy==2.1.3

      - name: Regenerate README.md and diff
        run: |
          python3 format_input.py
          if ! git diff --quiet -- README.md; then
            echo '::error::README.md is out of sync with items/*.json.'
            echo ''
            echo 'Run `python3 format_input.py` locally and commit the regenerated README.md (and model_release_timeline_vertical_listed.png) before pushing.'
            echo ''
            echo '--- diff (first 200 lines) ---'
            git diff -- README.md | head -200
            exit 1
          fi
          echo 'OK: README.md matches the canonical regeneration from items/*.json.'
